<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск магазинов в радиусе 1 км</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        #info {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px 15px; border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 14px;
            max-width: 400px;
        }
        #debug {
            position: absolute; bottom: 10px; left: 10px; z-index: 1000;
            background: rgba(255,255,255,0.95); padding: 10px; border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 12px;
            max-width: 500px; max-height: 200px; overflow-y: auto;
            display: none;
        }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div id="info">Кликните в любую точку на карте, чтобы найти магазины в радиусе 1 км</div>
<div id="debug"></div>
<div id="map"></div>

<script>
    const map = L.map('map').setView([55.751244, 37.618423], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let currentCircle = null;
    let currentMarkers = L.layerGroup().addTo(map);

    function log(message, type = 'info') {
        const debugDiv = document.getElementById('debug');
        debugDiv.style.display = 'block';
        const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
        debugDiv.innerHTML += `<span class="${className}">${message}</span><br>`;
        console.log(message);
    }

    map.on('click', async function(e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;
        const radius = 1000;

        if (currentCircle) map.removeLayer(currentCircle);
        currentMarkers.clearLayers();
        document.getElementById('debug').innerHTML = '';
        
        document.getElementById('info').innerText = 'Ищем магазины... Подождите.';

        currentCircle = L.circle([lat, lon], {
            radius: radius, color: '#3388ff', fillOpacity: 0.1
        }).addTo(map);

        log(`Координаты: ${lat.toFixed(6)}, ${lon.toFixed(6)}`);

        // Используем Overpass через GET запрос (лучше работает с CORS)
        const query = `
            [out:json][timeout:30];
            (
              node(around:${radius},${lat},${lon})["shop"="supermarket"];
              node(around:${radius},${lat},${lon})["shop"="convenience"];
            );
            out;
        `;

        // Пробуем разные серверы с GET запросом
        const servers = [
            `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`,
            `https://overpass.openstreetmap.ru/api/interpreter?data=${encodeURIComponent(query)}`,
            `https://overpass.kumi.systems/api/interpreter?data=${encodeURIComponent(query)}`
        ];

        let data = null;
        let lastError = null;

        for (let i = 0; i < servers.length; i++) {
            const url = servers[i];
            log(`Попытка ${i + 1}: сервер ${i + 1}`);

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                data = await response.json();
                log(`Успешно получены данные`, 'success');
                break;

            } catch (error) {
                lastError = error;
                log(`Ошибка: ${error.message}`, 'error');
            }
        }

        if (!data) {
            document.getElementById('info').innerText = 'Не удалось получить данные. Запустите локальный сервер.';
            log(`Все попытки неудачны: ${lastError?.message}`, 'error');
            return;
        }

        if (!data.elements || data.elements.length === 0) {
            document.getElementById('info').innerText = 'Магазины не найдены в этом районе';
            log('Магазины не найдены', 'error');
            return;
        }

        let count = 0;
        data.elements.forEach(el => {
            const elLat = el.lat;
            const elLon = el.lon;
            
            if (!elLat || !elLon) return;

            const name = el.tags.name || 'Магазин';
            const shopType = el.tags.shop || 'магазин';

            let color = '#666';
            let brandName = '';
            
            const nameLower = name.toLowerCase();
            
            if (nameLower.includes('пятёрочка') || nameLower.includes('пятерочка')) {
                color = '#e30613';
                brandName = 'Пятёрочка';
            } else if (nameLower.includes('магнит')) {
                color = '#e30613';
                brandName = 'Магнит';
            } else if (nameLower.includes('монетка')) {
                color = '#ff9900';
                brandName = 'Монетка';
            } else if (nameLower.includes('чижик')) {
                color = '#ffd700';
                brandName = 'Чижик';
            } else if (nameLower.includes('дикси')) {
                color = '#ffcc00';
                brandName = 'Дикси';
            } else if (nameLower.includes('перекрёсток') || nameLower.includes('перекресток')) {
                color = '#d52b1e';
                brandName = 'Перекрёсток';
            } else if (nameLower.includes('красное') && nameLower.includes('белое')) {
                color = '#d52b1e';
                brandName = 'Красное&Белое';
            } else if (nameLower.includes('бристоль')) {
                color = '#005eb8';
                brandName = 'Бристоль';
            } else if (nameLower.includes('верный')) {
                color = '#00a651';
                brandName = 'Верный';
            } else if (nameLower.includes('семья')) {
                color = '#00a651';
                brandName = 'Семья';
            } else {
                brandName = name;
                color = '#999';
            }

            const marker = L.circleMarker([elLat, elLon], {
                radius: 7, fillColor: color, color: '#fff',
                weight: 2, opacity: 1, fillOpacity: 0.9
            }).addTo(currentMarkers);

            const address = el.tags['addr:street'] 
                ? el.tags['addr:street'] + (el.tags['addr:housenumber'] ? ', ' + el.tags['addr:housenumber'] : '')
                : '';

            marker.bindPopup(`
                <b>${brandName}</b><br>
                Тип: ${shopType}<br>
                ${address ? 'Адрес: ' + address : ''}
            `);
            count++;
        });

        document.getElementById('info').innerText = `Найдено магазинов: ${count} (в радиусе 1 км)`;
        log(`Отображено: ${count} магазинов`, 'success');
        
        if (count > 0) {
            map.fitBounds(currentMarkers.getBounds(), { padding: [50, 50] });
        }
    });
</script>

</body>
</html>
