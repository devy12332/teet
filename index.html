<script>
    const map = L.map('map').setView([55.751244, 37.618423], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let currentCircle = null;
    let currentMarkers = L.layerGroup().addTo(map);
    let clickLatLng = null;
    let currentShopsData = [];

    function log(message, type = 'info') {
        const debugDiv = document.getElementById('debug');
        debugDiv.style.display = 'block';
        const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
        debugDiv.innerHTML += `<span class="${className}">${message}</span><br>`;
    }

    function formatDistance(meters) {
        return meters < 1000 ? Math.round(meters) + ' м' : (meters / 1000).toFixed(2) + ' км';
    }

    function getBrandInfo(name) {
        const n = name.toLowerCase();
        if (n.includes('пятёрочка') || n.includes('пятерочка')) return { color: '#e30613', brand: 'Пятёрочка' };
        if (n.includes('магнит')) return { color: '#e30613', brand: 'Магнит' };
        if (n.includes('монетка')) return { color: '#ff9900', brand: 'Монетка' };
        if (n.includes('чижик')) return { color: '#ffd700', brand: 'Чижик' };
        if (n.includes('дикси')) return { color: '#ffcc00', brand: 'Дикси' };
        if (n.includes('перекрёсток') || n.includes('перекресток')) return { color: '#d52b1e', brand: 'Перекрёсток' };
        if (n.includes('красное') && n.includes('белое')) return { color: '#d52b1e', brand: 'Красное&Белое' };
        if (n.includes('бристоль')) return { color: '#005eb8', brand: 'Бристоль' };
        if (n.includes('верный')) return { color: '#00a651', brand: 'Верный' };
        if (n.includes('семья')) return { color: '#00a651', brand: 'Семья' };
        return { color: '#999', brand: name };
    }

    function renderShopList() {
        const selectedTypes = getSelectedTypes();
        const filtered = currentShopsData.filter(shop => selectedTypes.has(shop.type));
        
        currentMarkers.clearLayers();
        filtered.forEach(shop => currentMarkers.addLayer(shop.marker));
        
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        if (filtered.length === 0) {
            list.innerHTML = '<li class="no-shops">Нет магазинов выбранных категорий</li>';
            document.getElementById('info').innerText = 'Нет магазинов выбранных категорий';
            return;
        }
        
        filtered.sort((a, b) => a.distance - b.distance);
        filtered.forEach((shop, index) => {
            const li = document.createElement('li');
            li.className = 'shop-item';
            li.innerHTML = `
                <div class="shop-name">
                    <span class="shop-color-dot" style="background:${shop.color}"></span>
                    ${index + 1}. ${shop.brand}
                </div>
                <div class="shop-type">Тип: ${shop.type}</div>
                ${shop.address ? `<div class="shop-address">📍 ${shop.address}</div>` : ''}
                <span class="shop-distance">🚶 ${formatDistance(shop.distance)}</span>
            `;
            li.addEventListener('click', () => {
                map.setView([shop.lat, shop.lon], 17);
                shop.marker.openPopup();
            });
            list.appendChild(li);
        });
        document.getElementById('info').innerText = `Отображено магазинов: ${filtered.length} из ${currentShopsData.length}`;
    }

    function getSelectedTypes() {
        const checkboxes = document.querySelectorAll('#category-filters input[type=checkbox]');
        const selected = new Set();
        checkboxes.forEach(cb => { if (cb.checked) selected.add(cb.value); });
        return selected;
    }

    function buildCategoryFilters() {
        const container = document.getElementById('category-filters');
        container.innerHTML = '';
        if (!currentShopsData.length) return;
        const types = [...new Set(currentShopsData.map(s => s.type))].sort();
        types.forEach(type => {
            const label = document.createElement('label');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = type;
            checkbox.checked = true;
            checkbox.addEventListener('change', renderShopList);
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(type));
            container.appendChild(label);
        });
    }

    // Функция fetch с таймаутом
    async function fetchWithTimeout(url, timeout = 15000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, {
                signal: controller.signal,
                headers: { 'Accept': 'application/json' }
            });
            clearTimeout(timeoutId);
            return response;
        } catch (error) {
            clearTimeout(timeoutId);
            throw error;
        }
    }

    map.on('click', async function(e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;
        const radius = 1000;
        clickLatLng = e.latlng;

        if (currentCircle) map.removeLayer(currentCircle);
        currentMarkers.clearLayers();
        document.getElementById('debug').innerHTML = '';
        document.getElementById('shop-list').innerHTML = '<li class="no-shops">Ищем магазины...</li>';
        document.getElementById('info').innerText = 'Ищем магазины... Подождите.';
        document.getElementById('category-filters').innerHTML = '';

        currentCircle = L.circle([lat, lon], {
            radius: radius, color: '#3388ff', fillOpacity: 0.1
        }).addTo(map);

        log(`Координаты: ${lat.toFixed(6)}, ${lon.toFixed(6)}`);

        const queryNodes = `[out:json][timeout:30]; node(around:${radius},${lat},${lon})["shop"]; out;`;
        const queryWays = `[out:json][timeout:30]; (way(around:${radius},${lat},${lon})["shop"]; relation(around:${radius},${lat},${lon})["shop"];); out center;`;

        // Оставляем самые стабильные серверы, убираем проблемный openstreetmap.ru
        const servers = [
            'https://overpass-api.de/api/interpreter',
            'https://overpass.kumi.systems/api/interpreter'
            // при необходимости можно добавить 'https://overpass.openstreetmap.ru/api/interpreter'
        ];

        async function fetchOverpass(query) {
            for (const server of servers) {
                const url = `${server}?data=${encodeURIComponent(query)}`;
                try {
                    const resp = await fetchWithTimeout(url);
                    if (resp.ok) return await resp.json();
                    log(`Сервер ${server} ответил статусом ${resp.status}`, 'error');
                } catch (err) {
                    log(`Ошибка запроса к ${server}: ${err.message}`, 'error');
                }
            }
            return null;
        }

        const [dataNodes, dataWays] = await Promise.all([
            fetchOverpass(queryNodes),
            fetchOverpass(queryWays)
        ]);

        const allElements = [];
        if (dataNodes && dataNodes.elements) allElements.push(...dataNodes.elements);
        if (dataWays && dataWays.elements) allElements.push(...dataWays.elements);

        if (allElements.length === 0) {
            document.getElementById('info').innerText = 'Магазины не найдены в этом районе';
            currentShopsData = [];
            renderShopList();
            log('Магазины не найдены или ошибка сети', 'error');
            return;
        }

        const shopsData = [];
        const addedIds = new Set();

        allElements.forEach(el => {
            if (el.lat === undefined || el.lon === undefined) return;
            const elementKey = `${el.type}/${el.id}`;
            if (addedIds.has(elementKey)) return;
            addedIds.add(elementKey);

            const name = el.tags?.name || 'Магазин';
            const shopType = el.tags?.shop || 'магазин';
            const brandInfo = getBrandInfo(name);
            const distance = clickLatLng.distanceTo(L.latLng(el.lat, el.lon));

            const address = el.tags?.['addr:street']
                ? el.tags['addr:street'] + (el.tags['addr:housenumber'] ? ', ' + el.tags['addr:housenumber'] : '')
                : '';

            const marker = L.circleMarker([el.lat, el.lon], {
                radius: 7, fillColor: brandInfo.color, color: '#fff',
                weight: 2, opacity: 1, fillOpacity: 0.9
            });
            marker.bindPopup(`
                <b>${brandInfo.brand}</b><br>
                Тип: ${shopType}<br>
                ${address ? 'Адрес: ' + address + '<br>' : ''}
                <b>Расстояние: ${formatDistance(distance)}</b>
            `);

            shopsData.push({
                brand: brandInfo.brand,
                type: shopType,
                address: address,
                color: brandInfo.color,
                lat: el.lat,
                lon: el.lon,
                distance: distance,
                marker: marker
            });
        });

        currentShopsData = shopsData;
        buildCategoryFilters();
        renderShopList();

        log(`Загружено магазинов: ${shopsData.length}`, 'success');
        if (shopsData.length > 0) {
            const bounds = L.latLngBounds(shopsData.map(s => [s.lat, s.lon]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }
    });
</script>
